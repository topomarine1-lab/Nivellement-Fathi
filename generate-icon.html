<!DOCTYPE html>
<html>
<head>
<title>Générateur d'icône SubTopo</title>
<style>
body { 
  background: #1a1a1a; 
  color: #fff; 
  font-family: Arial; 
  padding: 20px; 
  text-align: center;
}
canvas { 
  background: #fff; 
  margin: 20px; 
  border-radius: 20px;
}
button {
  background: #10b981;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
}
</style>
</head>
<body>

<h1>🎨 Générateur d'icône SubTopo Niv</h1>

<div>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <canvas id="canvas512" width="512" height="512"></canvas>
</div>

<div>
  <button onclick="download(192)">📥 Télécharger icon-192.png</button>
  <button onclick="download(512)">📥 Télécharger icon-512.png</button>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  const r = s * 0.2;
  
  // Fond arrondi vert
  ctx.fillStyle = '#10b981';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();
  
  // Gradient
  const gradient = ctx.createLinearGradient(0, 0, s, s);
  gradient.addColorStop(0, '#10b981');
  gradient.addColorStop(1, '#059669');
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Texte SUBTOPO
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${s * 0.13}px Arial Black`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SUBTOPO', s/2, s * 0.22);
  
  // Icône trépied au centre
  ctx.fillStyle = '#fff';
  ctx.font = `${s * 0.5}px Arial`;
  ctx.fillText('📐', s/2, s/2);
  
  // Texte NIVELLEMENT
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${s * 0.08}px Arial Black`;
  ctx.fillText('NIVELLEMENT', s/2, s * 0.88);
}

drawIcon(document.getElementById('canvas192'), 192);
drawIcon(document.getElementById('canvas512'), 512);

function download(size) {
  const canvas = document.getElementById('canvas' + size);
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>

</body>
</html>
