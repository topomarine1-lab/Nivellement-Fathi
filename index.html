<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10b981">
<title>SubTopo - Nivellement Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SubTopo Niv">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg-darkest:#071f1c; --bg-dark:#0a2e2a; --bg-card:#0f3a35; --bg-card-2:#0d342f;
  --border:#1a5f56; --emerald:#10b981; --emerald-light:#34d399; --emerald-dark:#059669;
  --text:#ffffff; --text-soft:#a7f3d0; --danger:#ef4444; --warning:#f59e0b; --success:#10b981;
}
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg-darkest); min-height:100vh; color:var(--text); overflow-x:hidden;
}

#loginOverlay {
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg,#071f1c 0%,#0a2e2a 50%,#071f1c 100%);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
#loginOverlay.hidden { display:none; }
.login-box {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:20px; padding:40px 30px; max-width:400px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.5); text-align:center;
}
.login-logo {
  width:80px; height:80px; border-radius:20px; margin:0 auto 20px;
  background:linear-gradient(135deg,#fff,#e8f5e9);
  display:flex; align-items:center; justify-content:center; font-size:46px;
  box-shadow:0 8px 24px rgba(16,185,129,.3); overflow:hidden;
}
.login-logo img { width:100%; height:100%; object-fit:cover; }
.login-title { font-size:22px; font-weight:800; margin-bottom:8px; }
.login-sub { font-size:13px; color:var(--text-soft); margin-bottom:30px; }
.login-box input {
  width:100%; padding:14px 16px; background:var(--bg-dark); color:#fff;
  border:1px solid var(--border); border-radius:12px;
  font-size:15px; margin-bottom:12px; text-align:center; letter-spacing:3px;
}
.login-box input:focus {
  outline:none; border-color:var(--emerald);
  box-shadow:0 0 0 3px rgba(16,185,129,.2);
}
.login-btn {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));
  color:#fff; font-weight:700; font-size:15px; cursor:pointer; letter-spacing:1px;
}
.login-error { color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }
.login-footer {
  margin-top:24px; padding-top:20px; border-top:1px solid var(--border);
  font-size:11px; color:var(--text-soft);
}

header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; background:var(--bg-dark);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
  gap:10px;
}
.logo { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
.logo-icon {
  width:46px; height:46px; border-radius:12px; overflow:hidden;
  background:linear-gradient(135deg,#fff,#d1fae5);
  display:flex; align-items:center; justify-content:center; font-size:26px;
  box-shadow:0 4px 12px rgba(16,185,129,.3); flex-shrink:0;
}
.logo-icon img { width:100%; height:100%; object-fit:cover; }
.logo-text h1 { font-size:15px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.logo-text p { font-size:10px; color:var(--text-soft); margin-top:2px; }
.header-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.icon-btn {
  background:transparent; border:1px solid var(--border);
  color:var(--text-soft); padding:8px 10px; border-radius:8px;
  font-size:13px; cursor:pointer;
}
.icon-btn:hover { background:var(--bg-card); color:#fff; }

.tabs {
  display:flex; background:var(--bg-dark);
  border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex:1; min-width:110px; padding:14px 8px; border:none; background:transparent;
  color:var(--text-soft); font-size:12px; font-weight:600;
  cursor:pointer; transition:all .3s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  border-bottom:2px solid transparent;
}
.tab:hover { color:#fff; background:rgba(16,185,129,.05); }
.tab.active {
  color:var(--emerald-light); border-bottom-color:var(--emerald);
  background:rgba(16,185,129,.08);
}
.tab-icon { font-size:18px; }

.panel { display:none; padding:16px; animation:fadeIn .3s; }
.panel.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:14px; padding:20px; margin-bottom:16px;
}
.card-title {
  font-size:12px; font-weight:700; color:var(--emerald-light);
  text-transform:uppercase; letter-spacing:2px; margin-bottom:16px;
}

.field { margin-bottom:14px; }
label {
  display:block; font-size:11px; font-weight:700; color:var(--emerald-light);
  text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px;
}
input, select {
  width:100%; padding:12px 14px; background:var(--bg-dark); color:#fff;
  border:1px solid var(--border); border-radius:10px;
  font-size:14px; font-weight:500;
}
input:focus, select:focus {
  outline:none; border-color:var(--emerald);
  box-shadow:0 0 0 3px rgba(16,185,129,.15);
}
.row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }

.btn {
  width:100%; padding:14px; border:none; border-radius:10px;
  font-size:14px; font-weight:700; cursor:pointer; transition:all .3s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:8px; letter-spacing:.3px;
}
.btn-primary { background:var(--emerald); color:#fff; }
.btn-primary:hover { background:var(--emerald-dark); }
.btn-outline { background:transparent; color:#fff; border:1px solid var(--border); }
.btn-outline:hover { background:var(--bg-card-2); border-color:var(--emerald); }
.btn-sm { padding:8px 12px; font-size:12px; }

/* NOUVELLE BOX TOLÉRANCE */
.tolerance-box {
  background:linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05));
  border:2px solid var(--emerald);
  border-radius:12px; padding:16px; margin-top:12px;
}
.tolerance-box.warning {
  background:linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
  border-color:var(--warning);
}
.tolerance-box.danger {
  background:linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
  border-color:var(--danger);
}
.tolerance-title {
  font-size:11px; font-weight:700; color:var(--emerald-light);
  text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px;
}
.tolerance-box.warning .tolerance-title { color:#fcd34d; }
.tolerance-box.danger .tolerance-title { color:#fca5a5; }
.tolerance-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;
}
.tolerance-item {
  background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; text-align:center;
}
.tolerance-label {
  font-size:10px; color:var(--text-soft); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:4px;
}
.tolerance-value {
  font-size:18px; font-weight:800; color:var(--emerald-light);
  font-family:'Courier New',monospace;
}
.tolerance-box.warning .tolerance-value { color:#fcd34d; }
.tolerance-box.danger .tolerance-value { color:#fca5a5; }
.tolerance-formula {
  font-size:11px; color:var(--text-soft); text-align:center;
  font-family:'Courier New',monospace; margin-top:8px;
  padding:8px; background:rgba(0,0,0,0.3); border-radius:6px;
}
.tolerance-status {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:10px; border-radius:8px; margin-top:10px;
  font-weight:700; font-size:13px;
}
.tolerance-status.ok { background:rgba(16,185,129,0.2); color:var(--emerald-light); }
.tolerance-status.warn { background:rgba(245,158,11,0.2); color:#fcd34d; }
.tolerance-status.error { background:rgba(239,68,68,0.2); color:#fca5a5; }

.data-table {
  width:100%; border-collapse:collapse; margin-top:14px;
  background:var(--bg-card-2); border-radius:10px; overflow:hidden; font-size:12px;
}
.data-table th {
  background:var(--bg-dark); padding:8px 6px; text-align:center;
  font-size:10px; text-transform:uppercase; letter-spacing:1px;
  color:var(--emerald-light); border-bottom:2px solid var(--emerald);
}
.data-table td {
  padding:6px 4px; text-align:center; border-bottom:1px solid var(--border);
  color:#fff;
}
.data-table input {
  width:100%; padding:6px 4px; background:transparent; color:#fff;
  border:1px solid transparent; border-radius:4px; font-size:12px;
  text-align:center; font-family:'Courier New',monospace;
}
.data-table input:focus { border-color:var(--emerald); background:rgba(16,185,129,.1); }
.data-table .computed { background:rgba(16,185,129,.08); font-weight:700; color:var(--emerald-light); }
.data-table .delete-btn {
  background:var(--danger); color:#fff; border:none;
  width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:10px;
}

.info-row {
  display:flex; justify-content:space-between; padding:10px 14px;
  background:var(--bg-card-2); border-radius:8px; margin-bottom:6px;
  font-size:13px; border:1px solid var(--border);
}
.info-row b { color:var(--emerald-light); }
.info-row span { color:#fff; font-family:'Courier New',monospace; font-weight:700; }

.summary-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;
}
.summary-item {
  background:var(--bg-card-2); padding:12px; border-radius:10px;
  border-left:3px solid var(--emerald); text-align:center;
}
.summary-label {
  font-size:10px; color:var(--text-soft); text-transform:uppercase;
  letter-spacing:1.5px; margin-bottom:4px;
}
.summary-value {
  font-size:18px; font-weight:800; color:var(--emerald-light);
  font-family:'Courier New',monospace;
}

.alert {
  padding:12px 14px; border-radius:8px; margin-top:10px;
  display:flex; align-items:center; gap:10px; font-size:13px;
}
.alert-success { background:rgba(16,185,129,.15); border:1px solid var(--emerald); color:var(--emerald-light); }
.alert-warning { background:rgba(245,158,11,.15); border:1px solid var(--warning); color:#fcd34d; }
.alert-danger { background:rgba(239,68,68,.15); border:1px solid var(--danger); color:#fca5a5; }

#chartContainer { background:#fff; border-radius:10px; padding:10px; margin-top:14px; }

.empty { text-align:center; padding:40px 20px; color:var(--text-soft); }
.empty span { font-size:60px; display:block; margin-bottom:12px; opacity:.4; }

.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(100px);
  background:var(--bg-card); color:#fff; padding:14px 24px; border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.6); border:1px solid var(--emerald);
  z-index:1000; transition:transform .4s; font-weight:600; font-size:14px;
}
.toast.show { transform:translateX(-50%) translateY(0); }

footer {
  text-align:center; padding:16px; font-size:11px; color:var(--text-soft);
  opacity:.7; border-top:1px solid var(--border); margin-top:20px;
}

@media (max-width:600px) {
  .row, .row-3 { grid-template-columns:1fr; }
  .data-table { font-size:11px; }
  .data-table input { font-size:11px; padding:4px; }
  .tolerance-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo" id="loginLogo">📐</div>
    <div class="login-title">SubTopo Engineering</div>
    <div class="login-sub">Nivellement Calculator — Accès protégé</div>
    <input type="password" id="pwdInput" placeholder="••••••••••" autocomplete="off">
    <button class="login-btn" onclick="tryLogin()">🔓 SE CONNECTER</button>
    <div class="login-error" id="pwdError"></div>
    <div class="login-footer">© 2025 SubTopo Engineering — <b style="color:var(--emerald-light)">NASRAOUI FATHI</b></div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon" id="headerLogo">📐</div>
    <div class="logo-text">
      <h1>SubTopo - Nivellement</h1>
      <p>Topographic Leveling</p>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="newProject()" title="Nouveau projet">📄</button>
    <button class="icon-btn" onclick="logout()" title="Quitter">🚪</button>
  </div>
</header>

<nav class="tabs">
